<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown编辑器</title>
  <link rel="stylesheet" href="styles/editor.css">
</head>
<body>
  <div class="app">
    <header>
      <div class="header-left">
        <h1>📝 Markdown编辑器</h1>
        <input type="text" id="filename" placeholder="文件名（不含.md）" value="">
      </div>
      <div class="header-right">
        <button id="saveDraft" class="btn">💾 保存草稿</button>
        <button id="download" class="btn btn-secondary">⬇️ 下载</button>
        <button id="publishGithub" class="btn btn-primary">🚀 发布到GitHub</button>
      </div>
    </header>
    
    <main>
      <div class="editor-panel">
        <div class="panel-header">
          <span>编辑</span>
          <div class="toolbar">
            <button data-action="bold" title="粗体"><b>B</b></button>
            <button data-action="italic" title="斜体"><i>I</i></button>
            <button data-action="code" title="代码">{'<>'}</button>
            <button data-action="link" title="链接">🔗</button>
            <button data-action="image" title="图片">🖼️</button>
            <button data-action="heading" title="标题">H</button>
            <button data-action="quote" title="引用">"</button>
            <button data-action="list" title="列表">≡</button>
          </div>
        </div>
        <textarea id="editor" placeholder="在此输入Markdown内容..."></textarea>
      </div>
      
      <div class="preview-panel">
        <div class="panel-header">
          <span>预览</span>
        </div>
        <div id="preview" class="markdown-body"></div>
      </div>
    </main>
    
    <!-- 草稿列表模态框 -->
    <div id="draftsModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>草稿列表</h2>
          <button class="close-btn">&times;</button>
        </div>
        <div id="draftsList" class="drafts-list"></div>
      </div>
    </div>
    
    <!-- 发布状态模态框 -->
    <div id="publishModal" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>发布到GitHub</h2>
          <button class="close-btn">&times;</button>
        </div>
        <div class="modal-body">
          <div class="form-group">
            <label>路径:</label>
            <input type="text" id="githubPath" placeholder="如: notes/my-note.md">
          </div>
          <div class="form-group">
            <label>提交信息:</label>
            <input type="text" id="commitMessage" placeholder="如: 添加新文章">
          </div>
          <div id="publishStatus"></div>
        </div>
        <div class="modal-footer">
          <button id="confirmPublish" class="btn btn-primary">确认发布</button>
        </div>
      </div>
    </div>
  </div>
  
  <script src="editor.js"></script>
</body>
</html>
