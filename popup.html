<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>网页转Markdown</title>
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
  <div class="container">
    <h1>📝 网页转Markdown</h1>
    
    <div class="section">
      <h2>GitHub配置</h2>
      <div class="form-group">
        <label for="token">访问令牌 (Token)</label>
        <input type="password" id="token" placeholder="输入GitHub Personal Access Token">
        <small>需要repo权限</small>
      </div>
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" placeholder="GitHub用户名">
      </div>
      <div class="form-group">
        <label for="repo">仓库名</label>
        <input type="text" id="repo" placeholder="仓库名（如：my-notes）">
      </div>
      <button id="saveConfig" class="btn btn-primary">保存配置</button>
    </div>
    
    <div class="section">
      <h2>操作</h2>
      <button id="savePage" class="btn btn-success">📄 保存当前页面</button>
      <button id="openEditor" class="btn">✏️ 打开编辑器</button>
      <button id="viewDrafts" class="btn">📂 查看草稿</button>
    </div>
    
    <div class="section">
      <h2>快速下载</h2>
      <button id="downloadNow" class="btn btn-secondary">⬇️ 直接下载当前页面</button>
    </div>
    
    <div id="status"></div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
